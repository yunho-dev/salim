<!DOCTYPE html>
<html lang="ko"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/auth}">
<head>
  <title>회원가입</title>
</head>
<body>

<div layout:fragment="content">
  <!-- 태그라인 -->
  <p class="text-center fw-bold text-dark mb-4">매일의 살림을 한눈에 정리해요</p>

  <div class="card card-md salim-auth-card">
    <div class="card-body p-4 p-md-5">

      <!-- 살 아이콘 -->
      <div class="text-center mb-3">
        <img th:src="@{/images/logo/salrim-symbol-light.svg}" alt="살림" class="auth-symbol">
      </div>

      <h2 class="text-center mb-1">회원가입</h2>
      <p class="text-center text-secondary mb-4">살림과 함께 시작해요</p>

      <form id="signupForm">
        <!-- 이메일 -->
        <div class="mb-3">
          <label class="form-label">아이디(ID)</label>
          <input type="text" id="memberId" name="memberId" class="form-control"
                 placeholder="아이디 입력" autocomplete="memberId">
          <small id="memberIdMsg" class="form-text"></small>
        </div>

        <!-- 비밀번호 -->
        <div class="mb-3">
          <div class="d-flex justify-content-between align-items-center">
            <label class="form-label mb-0">비밀번호(Password)</label>
          </div>
          <div class="input-group input-group-flat mt-1">
            <input type="password" id="password" name="password" class="form-control"
                   placeholder="비밀번호 입력" autocomplete="new-password">
            <span class="input-group-text">
                <a href="#" id="togglePassword"
                   class="link-secondary text-decoration-none">표시</a>
            </span>
          </div>
          <small id="passwordMsg" class="form-text"></small>
        </div>

        <!-- 비밀번호 확인 -->
        <div class="mb-3">
          <div class="d-flex justify-content-between align-items-center">
            <label class="form-label mb-0">비밀번호 확인</label>
          </div>
          <div class="input-group input-group-flat mt-1">
            <input type="password" id="passwordChk" name="passwordChk" class="form-control"
                   placeholder="비밀번호 다시 입력" autocomplete="off">
            <span class="input-group-text">
               <a href="#" id="togglePasswordChk"
                  class="link-secondary text-decoration-none">표시</a>
            </span>
          </div>
          <small id="passwordChkMsg" class="form-text"></small>
        </div>

        <!-- 이메일 -->
        <div class="mb-3">
          <div class="d-flex justify-content-between align-items-center">
            <label class="form-label mb-0">이메일</label>
          </div>
          <div class="input-group input-group-flat mt-1">
            <input type="email" id="email" name="email" class="form-control"
                   placeholder="name@example.com" autocomplete="off">
          </div>
          <small id="emailMsg" class="form-text"></small>
        </div>

        <!-- 이름 -->
        <div class="mb-3">
          <div class="d-flex justify-content-between align-items-center">
            <label class="form-label mb-0">이름</label>
          </div>
          <div class="input-group input-group-flat mt-1">
            <input type="text" id="name" name="name" class="form-control"
                   placeholder="이름 입력" autocomplete="name">
          </div>
          <small id="nameMsg" class="form-text"></small>
        </div>

        <!-- 가입 버튼 -->
        <button type="submit" class="btn btn-primary w-100">가입하기</button>
      </form>

      <!-- 로그인 창으로 이동 -->
      <p class="text-center text-secondary mt-3">
        이미 계정이 있으신가요? <a href="/login" class="fw-bold text-decoration-none">로그인</a>
      </p>

    </div>
  </div>

</div>

<th:block layout:fragment="scripts">
  <script>
    // 아이디 정규식: 영문 소문자, 4~20자
    const ID_REGEX = /^[a-z][a-z0-9]{3,19}$/;
    // 비밀번호 정규식: 영문 + 특수문자 포함, 8~20자
    const PW_REGEX = /^(?=.*[A-Za-z])(?=.*[!@#$%^&*()_+\-=\[\]{}|;:,.<>?]).{8,}$/;

    // 메시지 표시
    function showMsg(id, message, isValid) {
      const el = document.getElementById(id);
      el.textContent = message;
      el.style.color = isValid ? 'var(--salim-income)' : 'var(--tblr-danger)'; // 딥그린 or 빨강
    }

    // 아이디: 정규식 → 통과하면 중복 체크
    let isIdAvailable = false;
    document.getElementById('memberId').addEventListener('blur', async function () {
      const val = this.value;
      if (!val) { showMsg('memberIdMsg', '아이디를 입력해주세요.', false); return; }
      if (!ID_REGEX.test(val)) { showMsg('memberIdMsg', '영문 소문자로 시작하는 4~20자입니다.', false); isIdAvailable = false; return; }

      try {
        const res = await fetch(`/api/members/check-id?memberId=${encodeURIComponent(val)}`);
        const data = await res.json();
        isIdAvailable = data.available;
        showMsg('memberIdMsg', data.available ? '사용 가능한 아이디입니다.' : '이미 사용 중인 아이디입니다.', data.available);
      } catch {
        showMsg('memberIdMsg', '중복 확인에 실패했습니다.', false);
        isIdAvailable = false;
      }
    });

    // 비밀번호: 정규식
    let isPwValid = false;
    document.getElementById('password').addEventListener('blur', function () {
      const val = this.value;
      if (!val) { showMsg('passwordMsg', '비밀번호를 입력해주세요.', false); return; }
      isPwValid = PW_REGEX.test(val);
      showMsg('passwordMsg',
              isPwValid ? '사용 가능한 비밀번호입니다.' : '영문과 특수문자를 포함해 8자 이상이어야 합니다.',
              isPwValid
      );
    });

    // 비밀번호 확인: 일치 여부
    let isPwChkValid = false;
    document.getElementById('passwordChk').addEventListener('blur', function () {
      const pw = document.getElementById('password').value;
      const val = this.value;
      if (!val) { showMsg('passwordChkMsg', '비밀번호를 다시 입력해주세요.', false); return; }
      isPwChkValid = pw === val;
      showMsg('passwordChkMsg',
              isPwChkValid ? '비밀번호가 일치합니다.' : '비밀번호가 일치하지 않습니다.',
              isPwChkValid
      );
    });

    // 이메일: 중복 체크 (type="email"이 형식은 이미 잡아줌)
    let isEmailAvailable = false;
    document.getElementById('email').addEventListener('blur', async function () {
      const val = this.value;
      if (!val) { showMsg('emailMsg', '이메일을 입력해주세요.', false); return; }

      try {
        const res = await fetch(`/api/members/check-email?email=${encodeURIComponent(val)}`);
        const data = await res.json();
        isEmailAvailable = data.available;
        showMsg('emailMsg', data.available ? '사용 가능한 이메일입니다.' : '이미 등록된 이메일입니다.', data.available);
      } catch {
        showMsg('emailMsg', '중복 확인에 실패했습니다.', false);
        isEmailAvailable = false;
      }
    });

    // 이름: 빈값만 체크
    let isNameValid = false;
    document.getElementById('name').addEventListener('blur', function () {
      isNameValid = this.value.trim().length > 0;
      showMsg('nameMsg', isNameValid ? '' : '이름을 입력해주세요.', isNameValid);
    });

    // 비밀번호 표시 토글
    function bindToggle(toggleId, inputId) {
      const toggle = document.getElementById(toggleId);
      const input = document.getElementById(inputId);
      toggle.addEventListener('click', function (e) {
        e.preventDefault();
        const isHidden = input.type === 'password';
        input.type = isHidden ? 'text' : 'password';
        toggle.textContent = isHidden ? '숨김' : '표시';
      });
    }
    bindToggle('togglePassword', 'password');
    bindToggle('togglePasswordChk', 'passwordChk');

    // 제출
    document.getElementById('signupForm').addEventListener('submit', async function (e) {
      e.preventDefault();

      if (!isIdAvailable)    { showMsg('memberIdMsg', '아이디 중복 확인이 필요합니다.', false); return; }
      if (!isPwValid)        { showMsg('passwordMsg', '비밀번호 형식을 확인해주세요.', false); return; }
      if (!isPwChkValid)     { showMsg('passwordChkMsg', '비밀번호 확인이 필요합니다.', false); return; }
      if (!isEmailAvailable) { showMsg('emailMsg', '이메일 중복 확인이 필요합니다.', false); return; }
      if (!isNameValid)      { showMsg('nameMsg', '이름을 입력해주세요.', false); return; }

      try {
        const res = await fetch('/api/members/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            memberId: document.getElementById('memberId').value,
            password: document.getElementById('password').value,
            email: document.getElementById('email').value,
            name: document.getElementById('name').value
          })
        });

        if (res.ok) {
          window.location.href = '/login';
        } else {
          const err = await res.json();
          alert(err?.message ?? '가입에 실패했습니다.');
        }
      } catch {
        alert('네트워크 오류가 발생했습니다.');
      }
    });

  </script>
</th:block>

</body>
</html>
