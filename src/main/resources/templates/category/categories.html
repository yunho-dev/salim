<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<head>
  <title>카테고리 관리</title>
</head>

<th:block layout:fragment="page-css">
  <link th:href="@{/css/category/categories.css}" rel="stylesheet"/>
</th:block>

<section layout:fragment="content">

  <!-- 페이지 헤더 -->
  <div class="page-header d-print-none">
    <div class="container-fluid">
      <div class="d-flex align-items-end justify-content-between">
        <div>
          <div class="page-pretitle">카테고리</div>
          <h1 class="page-title mt-1">카테고리 관리</h1>
        </div>
        <button type="button" class="btn-add" id="btnOpenModal">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14M5 12h14"/>
          </svg>
          카테고리 추가
        </button>
      </div>
    </div>
  </div>

  <div class="page-body">
    <div class="container-fluid">

      <!-- 탭: 지출 / 수입 -->
      <div class="cat-tabs mb-4">
        <button type="button" class="cat-tab active" data-type="expense">
          지출 카테고리
          <span class="cat-tab-count">0</span>
        </button>
        <button type="button" class="cat-tab" data-type="income">
          수입 카테고리
          <span class="cat-tab-count">0</span>
        </button>
      </div>

      <!-- ===== 지출 카테고리 패널 ===== -->
      <div id="panel-expense">
        <!-- 카드는 category.js에서 GET /api/categories 응답으로 렌더링 -->
        <div class="cat-grid d-none" id="grid-expense"></div>
        <div class="cat-empty d-none" id="empty-expense">
          <div class="cat-empty-icon">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4z"/><path d="M17 14v6M14 17h6"/>
            </svg>
          </div>
          <div class="cat-empty-title">카테고리를 추가해보세요</div>
          <div class="cat-empty-desc">카테고리를 만들면 거래를 분류하고 지출 패턴을<br>한눈에 볼 수 있어요.</div>
          <button type="button" class="btn-add js-open-modal">+ 카테고리 추가</button>
        </div>
      </div>

      <!-- ===== 수입 카테고리 패널 (기본 숨김) ===== -->
      <div id="panel-income" class="d-none">
        <div class="cat-grid d-none" id="grid-income"></div>
        <div class="cat-empty d-none" id="empty-income">
          <div class="cat-empty-icon">
            <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                 stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 4h6v6H4zM14 4h6v6h-6zM4 14h6v6H4z"/><path d="M17 14v6M14 17h6"/>
            </svg>
          </div>
          <div class="cat-empty-title">카테고리를 추가해보세요</div>
          <div class="cat-empty-desc">카테고리를 만들면 수입을 분류하고 흐름을 한눈에 볼 수 있어요.</div>
          <button type="button" class="btn-add js-open-modal">+ 카테고리 추가</button>
        </div>
      </div>

    </div>
  </div>

  <!-- ===== 카테고리 추가/편집 모달 ===== -->
  <div id="categoryModal" class="salim-modal-overlay d-none">
    <div class="salim-modal">

      <div class="salim-modal-header">
        <h2>카테고리 추가</h2>
        <button type="button" class="modal-close">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
               stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 6 6 18M6 6l12 12"/>
          </svg>
        </button>
      </div>

      <div class="salim-modal-body">

        <!-- 유형 토글 -->
        <div>
          <label class="form-label-sm">유형</label>
          <div class="type-toggle" id="typeToggle">
            <button type="button" class="active" data-type="expense">지출</button>
            <button type="button" data-type="income">수입</button>
          </div>
        </div>

        <!-- 이름 입력 -->
        <div>
          <label class="form-label-sm">카테고리 이름</label>
          <input type="text" id="categoryName" class="salim-input" placeholder="예: 식비, 교통, 문화">
          <span id="nameError" class="d-none"
                style="font-size:0.75rem;color:var(--salim-expense);margin-top:5px;display:block;">
            카테고리 이름을 입력해주세요.
          </span>
        </div>

        <!-- 아이콘 피커: 색상은 선택된 유형(지출/수입)을 따라감 -->
        <div>
          <label class="form-label-sm">아이콘</label>
          <!-- title(툴팁)은 category.js의 CATEGORY_ICONS에서 동적으로 채움 -->
          <div class="icon-picker" id="iconPicker" data-type="expense">
            <button type="button" class="active" data-icon="food"></button>
            <button type="button" data-icon="transport"></button>
            <button type="button" data-icon="housing"></button>
            <button type="button" data-icon="culture"></button>
            <button type="button" data-icon="shopping"></button>
            <button type="button" data-icon="subscription"></button>
            <button type="button" data-icon="salary"></button>
            <button type="button" data-icon="side"></button>
            <button type="button" data-icon="interest"></button>
            <button type="button" data-icon="etc"></button>
          </div>
        </div>

      </div>

      <div class="salim-modal-footer">
        <span id="submitError" class="d-none"
              style="font-size:0.78rem;color:var(--salim-expense);margin-right:auto;align-self:center;"></span>
        <button type="button" class="btn-cancel">취소</button>
        <button type="button" class="btn-submit" id="submitCategoryBtn">추가하기</button>
      </div>

    </div>
  </div>
</section>

<th:block layout:fragment="page-js">
  <script th:src="@{/js/category/categories.js}"></script>
</th:block>

</html>
