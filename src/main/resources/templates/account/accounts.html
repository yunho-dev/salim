<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<head>
    <title>계좌 관리</title>

    <th:block layout:fragment="page-css">
        <style>
            .card {
                border: 1px solid #e6e9ee;
                border-radius: 10px;
                box-shadow: none;
            }

            .page-pretitle {
                color: #8a97a5;
                font-weight: 600;
                letter-spacing: 0.04em;
            }

            .page-title {
                font-size: 1.4375rem;
                font-weight: 800;
                color: var(--salim-balance);
                letter-spacing: -0.01em;
            }

            .btn-add-dark {
                background-color: var(--salim-balance);
                border-color: var(--salim-balance);
                color: #fff;
                font-weight: 700;
                font-size: 0.84375rem;
                padding: 0.5625rem 1.125rem;
            }

            .btn-add-dark:hover {
                background-color: #293b4f;
                border-color: #293b4f;
                color: #fff;
            }

            /* ===== 전체 자산 요약 ===== */
            .asset-summary {
                background: #fff;
                border: 1px solid #e6e9ee;
                border-radius: 14px;
                padding: 1.625rem 1.75rem;
                display: flex;
                align-items: center;
                justify-content: space-between;
                gap: 20px;
                margin-bottom: 1.25rem;
            }

            .asset-summary-label {
                font-size: 0.78125rem;
                font-weight: 700;
                color: #8a97a5;
                letter-spacing: 0.02em;
                margin-bottom: 10px;
            }

            .asset-summary-currency {
                font-size: 1.3125rem;
                font-weight: 700;
                color: var(--salim-balance);
            }

            .asset-summary-value {
                font-size: 2.5rem;
                font-weight: 800;
                color: var(--salim-balance);
                letter-spacing: -0.02em;
                line-height: 1;
            }

            .asset-summary-sub {
                font-size: 0.8125rem;
                font-weight: 600;
                color: #8a97a5;
                margin-top: 11px;
            }

            .asset-summary-icon {
                width: 62px;
                height: 62px;
                border-radius: 16px;
                background: rgba(45, 106, 79, 0.10);
                display: flex;
                align-items: center;
                justify-content: center;
                flex-shrink: 0;
            }

            /* ===== 은행 그룹 ===== */
            .account-group {
                margin-bottom: 1.125rem;
            }

            .account-group-header {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 0 0.25rem 0.5625rem;
            }

            .account-group-name {
                font-size: 0.78125rem;
                font-weight: 700;
                color: #5b6b7b;
            }

            .account-group-count {
                font-size: 0.6875rem;
                font-weight: 700;
                color: #8a97a5;
                padding: 1px 7px;
                border-radius: 20px;
                background: #eef1f5;
            }

            .account-list {
                background: #fff;
                border: 1px solid #e6e9ee;
                border-radius: 12px;
                overflow: hidden;
            }

            .account-row {
                display: flex;
                align-items: center;
                gap: 16px;
                padding: 1.125rem 1.375rem;
                border-top: 1px solid #f0f2f5;
            }

            .account-row:first-child {
                border-top: none;
            }

            .account-row:hover {
                background: #fafbfc;
            }

            .account-avatar {
                width: 46px;
                height: 46px;
                border-radius: 50%;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 1rem;
                font-weight: 800;
            }

            .account-nickname {
                font-size: 0.9375rem;
                font-weight: 700;
                color: var(--salim-balance);
            }

            .account-bank-badge {
                font-size: 0.6875rem;
                font-weight: 700;
                color: #5b6b7b;
                padding: 1px 8px;
                border-radius: 5px;
                background: #f1f3f6;
            }

            .account-masked {
                font-size: 0.78125rem;
                color: #8a97a5;
                font-weight: 600;
                margin-top: 4px;
                font-variant-numeric: tabular-nums;
                letter-spacing: 0.02em;
            }

            .account-balance-label {
                font-size: 0.6875rem;
                font-weight: 600;
                color: #8a97a5;
                margin-bottom: 3px;
            }

            .account-balance-value {
                font-size: 1.125rem;
                font-weight: 800;
                color: var(--salim-balance);
                font-variant-numeric: tabular-nums;
            }

            .account-actions .btn-icon {
                width: 34px;
                height: 34px;
                display: flex;
                align-items: center;
                justify-content: center;
                border: 1px solid #e6e9ee;
                background: #fff;
                border-radius: 8px;
                color: #5b6b7b;
            }

            .account-actions .btn-icon:hover {
                background: #f4f6fa;
                color: var(--salim-balance);
            }

            .account-actions .btn-icon-delete:hover {
                background: rgba(193, 96, 74, 0.08);
                color: var(--salim-expense);
                border-color: rgba(193, 96, 74, 0.3);
            }

            /* ===== 모달: 은행 선택 ===== */
            .bank-select {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 9px;
            }

            .bank-select .btn {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 7px;
                padding: 0.8125rem 0.375rem;
                border: 1.5px solid #e6e9ee;
                background: #fff;
                border-radius: 11px;
                font-size: 0.6875rem;
                font-weight: 700;
                color: #5b6b7b;
            }

            .bank-select .btn-check:checked + .btn {
                border-color: var(--salim-balance);
                background: #f7f9fb;
                color: var(--salim-balance);
            }

            .bank-avatar-sm {
                width: 34px;
                height: 34px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.8125rem;
                font-weight: 800;
            }

            .amount-input-wrap {
                position: relative;
            }

            .amount-input-wrap .currency-prefix {
                position: absolute;
                left: 13px;
                top: 50%;
                transform: translateY(-50%);
                font-size: 0.875rem;
                font-weight: 700;
                color: #8a97a5;
            }

            .amount-input-wrap .unit-suffix {
                position: absolute;
                right: 13px;
                top: 50%;
                transform: translateY(-50%);
                font-size: 0.78125rem;
                font-weight: 600;
                color: #b3bdc8;
            }

            .amount-input-wrap input {
                padding-left: 30px;
                padding-right: 32px;
                font-variant-numeric: tabular-nums;
            }
        </style>
    </th:block>
</head>

<body>
<section layout:fragment="content">

    <!-- 페이지 헤더 -->
    <div class="page-header d-print-none">
        <div class="container-fluid">
            <div class="row g-2 align-items-center">
                <div class="col">
                    <div class="page-pretitle" style="margin-bottom: 5px;">자산</div>
                    <h2 class="page-title">계좌 관리</h2>
                </div>
                <div class="col-auto ms-auto d-print-none">
                    <button type="button" class="btn btn-add-dark" data-bs-toggle="modal" data-bs-target="#modal-add-account">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        계좌 추가
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="page-body">
        <div class="container-fluid">

            <!-- 전체 자산 요약 -->
            <div class="asset-summary">
                <div>
                    <div class="asset-summary-label">전체 자산 합계</div>
                    <div class="d-flex align-items-baseline gap-1">
                        <span class="asset-summary-currency">₩</span>
                        <span class="asset-summary-value">12,840,000</span>
                    </div>
                    <div class="asset-summary-sub">등록 계좌 3개 · 3개 은행</div>
                </div>
                <div class="asset-summary-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24"
                         fill="none" stroke="#2D6A4F" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3"/>
                    </svg>
                </div>
            </div>

            <!-- 국민은행 -->
            <div class="account-group">
                <div class="account-group-header">
                    <span class="account-group-name">국민은행</span>
                    <span class="account-group-count">1</span>
                </div>
                <div class="account-list">
                    <div class="account-row" style="border-left: 3px solid #FFB300;">
                        <span class="account-avatar" style="background:#FFB300; color:#1E2D3D;">국</span>
                        <div class="flex-fill" style="min-width: 0;">
                            <div class="d-flex align-items-center gap-2">
                                <span class="account-nickname">생활비 통장</span>
                                <span class="account-bank-badge">국민은행</span>
                            </div>
                            <div class="account-masked">110-***-123456</div>
                        </div>
                        <div class="text-end me-2">
                            <div class="account-balance-label">현재 잔액</div>
                            <div class="account-balance-value">₩2,840,000</div>
                        </div>
                        <div class="d-flex gap-2 account-actions flex-shrink-0">
                            <button type="button" class="btn-icon" title="편집">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/>
                                </svg>
                            </button>
                            <button type="button" class="btn-icon btn-icon-delete" title="삭제">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 카카오뱅크 -->
            <div class="account-group">
                <div class="account-group-header">
                    <span class="account-group-name">카카오뱅크</span>
                    <span class="account-group-count">1</span>
                </div>
                <div class="account-list">
                    <div class="account-row" style="border-left: 3px solid #FFDC2E;">
                        <span class="account-avatar" style="background:#FFDC2E; color:#1E2D3D;">카</span>
                        <div class="flex-fill" style="min-width: 0;">
                            <div class="d-flex align-items-center gap-2">
                                <span class="account-nickname">비상금</span>
                                <span class="account-bank-badge">카카오뱅크</span>
                            </div>
                            <div class="account-masked">333-***-789012</div>
                        </div>
                        <div class="text-end me-2">
                            <div class="account-balance-label">현재 잔액</div>
                            <div class="account-balance-value">₩1,500,000</div>
                        </div>
                        <div class="d-flex gap-2 account-actions flex-shrink-0">
                            <button type="button" class="btn-icon" title="편집">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/>
                                </svg>
                            </button>
                            <button type="button" class="btn-icon btn-icon-delete" title="삭제">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 신한은행 -->
            <div class="account-group">
                <div class="account-group-header">
                    <span class="account-group-name">신한은행</span>
                    <span class="account-group-count">1</span>
                </div>
                <div class="account-list">
                    <div class="account-row" style="border-left: 3px solid #2249C9;">
                        <span class="account-avatar" style="background:#2249C9; color:#fff;">신</span>
                        <div class="flex-fill" style="min-width: 0;">
                            <div class="d-flex align-items-center gap-2">
                                <span class="account-nickname">월급 통장</span>
                                <span class="account-bank-badge">신한은행</span>
                            </div>
                            <div class="account-masked">110-***-456789</div>
                        </div>
                        <div class="text-end me-2">
                            <div class="account-balance-label">현재 잔액</div>
                            <div class="account-balance-value">₩8,500,000</div>
                        </div>
                        <div class="d-flex gap-2 account-actions flex-shrink-0">
                            <button type="button" class="btn-icon" title="편집">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/>
                                </svg>
                            </button>
                            <button type="button" class="btn-icon btn-icon-delete" title="삭제">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                </svg>
                            </button>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <!-- 계좌 추가 모달 -->
    <div class="modal modal-blur fade" id="modal-add-account" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">계좌 추가</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <form>

                        <!-- 은행 선택 -->
                        <div class="mb-3">
                            <label class="form-label">은행 선택</label>
                            <div class="bank-select">
                                <input type="radio" class="btn-check" name="bank-select" id="bank-kb" checked>
                                <label class="btn" for="bank-kb">
                                    <span class="bank-avatar-sm" style="background:#FFB300; color:#1E2D3D;">국</span>
                                    국민
                                </label>

                                <input type="radio" class="btn-check" name="bank-select" id="bank-shinhan">
                                <label class="btn" for="bank-shinhan">
                                    <span class="bank-avatar-sm" style="background:#2249C9; color:#fff;">신</span>
                                    신한
                                </label>

                                <input type="radio" class="btn-check" name="bank-select" id="bank-woori">
                                <label class="btn" for="bank-woori">
                                    <span class="bank-avatar-sm" style="background:#0067AC; color:#fff;">우</span>
                                    우리
                                </label>

                                <input type="radio" class="btn-check" name="bank-select" id="bank-hana">
                                <label class="btn" for="bank-hana">
                                    <span class="bank-avatar-sm" style="background:#00857A; color:#fff;">하</span>
                                    하나
                                </label>

                                <input type="radio" class="btn-check" name="bank-select" id="bank-nh">
                                <label class="btn" for="bank-nh">
                                    <span class="bank-avatar-sm" style="background:#1E9E4F; color:#fff;">농</span>
                                    농협
                                </label>

                                <input type="radio" class="btn-check" name="bank-select" id="bank-kakao">
                                <label class="btn" for="bank-kakao">
                                    <span class="bank-avatar-sm" style="background:#FFDC2E; color:#1E2D3D;">카</span>
                                    카카오
                                </label>

                                <input type="radio" class="btn-check" name="bank-select" id="bank-toss">
                                <label class="btn" for="bank-toss">
                                    <span class="bank-avatar-sm" style="background:#2F6BFF; color:#fff;">토</span>
                                    토스
                                </label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">계좌번호</label>
                            <input type="text" class="form-control" placeholder="예: 110-123-456789">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">계좌 별명</label>
                            <input type="text" class="form-control" placeholder="예: 생활비 통장, 비상금">
                        </div>

                        <div class="mb-0">
                            <label class="form-label">초기 잔액</label>
                            <div class="amount-input-wrap">
                                <span class="currency-prefix">₩</span>
                                <input type="text" class="form-control" placeholder="0">
                                <span class="unit-suffix">원</span>
                            </div>
                        </div>

                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-add-dark">계좌 추가</button>
                </div>

            </div>
        </div>
    </div>

</section>
</body>
</html>
