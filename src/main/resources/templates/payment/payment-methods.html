<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout/layout}">

<head>
    <title>결제수단 관리</title>

    <th:block layout:fragment="page-css">
        <style>
            .card {
                border: 1px solid #e6e9ee;
                border-radius: 10px;
                box-shadow: none;
            }

            .page-pretitle {
                color: #8a97a5;
                font-weight: 600;
                letter-spacing: 0.04em;
            }

            .page-title {
                font-size: 1.4375rem;
                font-weight: 800;
                color: var(--sallim-balance);
                letter-spacing: -0.01em;
            }

            /* ===== 추가 버튼 (네이비) ===== */
            .btn-add-dark {
                background-color: var(--sallim-balance);
                border-color: var(--sallim-balance);
                color: #fff;
                font-weight: 700;
                font-size: 0.84375rem;
                padding: 0.5625rem 1.125rem;
            }

            .btn-add-dark:hover {
                background-color: #293b4f;
                border-color: #293b4f;
                color: #fff;
            }

            /* ===== 그룹 헤더 ===== */
            .payment-group {
                margin-bottom: 1.125rem;
            }

            .payment-group-header {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 0 0.25rem 0.5625rem;
            }

            .payment-group-name {
                font-size: 0.78125rem;
                font-weight: 700;
                color: #5b6b7b;
            }

            .payment-group-count {
                font-size: 0.6875rem;
                font-weight: 700;
                color: #8a97a5;
                padding: 1px 7px;
                border-radius: 20px;
                background: #eef1f5;
            }

            /* ===== 결제수단 카드 그룹 ===== */
            .payment-list {
                background: #fff;
                border: 1px solid #e6e9ee;
                border-radius: 12px;
                overflow: hidden;
            }

            .payment-row {
                display: flex;
                align-items: center;
                gap: 16px;
                padding: 1.125rem 1.375rem;
                border-top: 1px solid #f0f2f5;
                border-left: 3px solid var(--sallim-income);
            }

            .payment-row:first-child {
                border-top: none;
            }

            .payment-row:hover {
                background: #fafbfc;
            }

            .payment-icon {
                width: 46px;
                height: 46px;
                border-radius: 11px;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .payment-icon-card {
                background: rgba(45, 106, 79, 0.10);
                color: var(--sallim-income);
            }

            .payment-icon-bank {
                background: rgba(30, 45, 61, 0.08);
                color: var(--sallim-balance);
            }

            .payment-icon-cash {
                background: rgba(193, 96, 74, 0.10);
                color: var(--sallim-expense);
            }

            .payment-name {
                font-size: 0.9375rem;
                font-weight: 700;
                color: var(--sallim-balance);
            }

            .payment-linked-badge {
                font-size: 0.6875rem;
                font-weight: 700;
                color: #5b6b7b;
                padding: 1px 8px;
                border-radius: 5px;
                background: #f1f3f6;
            }

            .payment-memo {
                font-size: 0.78125rem;
                color: #8a97a5;
                font-weight: 600;
                margin-top: 4px;
            }

            .payment-lastused-label {
                font-size: 0.6875rem;
                font-weight: 600;
                color: #8a97a5;
                margin-bottom: 3px;
            }

            .payment-lastused-value {
                font-size: 0.84375rem;
                font-weight: 700;
                color: var(--sallim-balance);
                font-variant-numeric: tabular-nums;
            }

            .payment-actions .btn-icon {
                width: 34px;
                height: 34px;
                display: flex;
                align-items: center;
                justify-content: center;
                border: 1px solid #e6e9ee;
                background: #fff;
                border-radius: 8px;
                color: #5b6b7b;
            }

            .payment-actions .btn-icon:hover {
                background: #f4f6fa;
                color: var(--sallim-balance);
            }

            .payment-actions .btn-icon-delete:hover {
                background: rgba(193, 96, 74, 0.08);
                color: var(--sallim-expense);
                border-color: rgba(193, 96, 74, 0.3);
            }

            /* ===== 모달: 유형 선택 ===== */
            .type-select {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 9px;
            }

            .type-select .btn {
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 8px;
                padding: 0.9375rem 0.375rem;
                border: 1.5px solid #e6e9ee;
                background: #fff;
                border-radius: 11px;
                color: #5b6b7b;
                font-size: 0.78125rem;
                font-weight: 700;
            }

            .type-select .btn svg {
                color: #8a97a5;
            }

            .type-select .btn-check:checked + .btn {
                border-color: var(--sallim-balance);
                background: #f7f9fb;
                color: var(--sallim-balance);
            }

            .type-select .btn-check:checked + .btn svg {
                color: var(--sallim-balance);
            }
        </style>
    </th:block>
</head>

<body>
<section layout:fragment="content">

    <!-- 페이지 헤더 -->
    <div class="page-header d-print-none">
        <div class="container-fluid">
            <div class="row g-2 align-items-center">
                <div class="col">
                    <div class="page-pretitle" style="margin-bottom: 5px;">자산</div>
                    <h2 class="page-title">결제수단 관리</h2>
                </div>
                <div class="col-auto ms-auto d-print-none">
                    <button type="button" class="btn btn-add-dark" data-bs-toggle="modal" data-bs-target="#modal-add-payment">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 5v14M5 12h14"/>
                        </svg>
                        결제수단 추가
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="page-body">
        <div class="container-fluid">

            <!-- 카드 그룹 -->
            <div class="payment-group">
                <div class="payment-group-header">
                    <span class="payment-group-name">카드</span>
                    <span class="payment-group-count">3</span>
                </div>
                <div class="payment-list">

                    <div class="payment-row">
                        <span class="payment-icon payment-icon-card">

                                <rect x="2" y="5" width="20" height="14" rx="2"/>
                                <path d="M2 10h20"/>
                            </svg>
                        </span>
                        <div class="flex-fill" style="min-width: 0;">
                            <div class="d-flex align-items-center gap-2">
                                <span class="payment-name">신한카드</span>
                                <span class="payment-linked-badge">생활비 통장</span>
                            </div>
                            <div class="payment-memo">주거래 신용카드</div>
                        </div>
                        <div class="text-end me-2">
                            <div class="payment-lastused-label">최근 사용</div>
                            <div class="payment-lastused-value">2026.06.29</div>
                        </div>
                        <div class="d-flex gap-2 payment-actions flex-shrink-0">
                            <button type="button" class="btn-icon" title="편집">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/>
                                </svg>
                            </button>
                            <button type="button" class="btn-icon btn-icon-delete" title="삭제">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="payment-row">
                        <span class="payment-icon payment-icon-card">
                            <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="5" width="20" height="14" rx="2"/>
                                <path d="M2 10h20"/>
                            </svg>
                        </span>
                        <div class="flex-fill" style="min-width: 0;">
                            <div class="d-flex align-items-center gap-2">
                                <span class="payment-name">현대카드</span>
                                <span class="payment-linked-badge">월급 통장</span>
                            </div>
                            <div class="payment-memo">정기결제 · 구독</div>
                        </div>
                        <div class="text-end me-2">
                            <div class="payment-lastused-label">최근 사용</div>
                            <div class="payment-lastused-value">2026.06.27</div>
                        </div>
                        <div class="d-flex gap-2 payment-actions flex-shrink-0">
                            <button type="button" class="btn-icon" title="편집">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/>
                                </svg>
                            </button>
                            <button type="button" class="btn-icon btn-icon-delete" title="삭제">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="payment-row">
                        <span class="payment-icon payment-icon-card">
                            <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="5" width="20" height="14" rx="2"/>
                                <path d="M2 10h20"/>
                            </svg>
                        </span>
                        <div class="flex-fill" style="min-width: 0;">
                            <div class="d-flex align-items-center gap-2">
                                <span class="payment-name">카카오페이</span>
                                <span class="payment-linked-badge">비상금</span>
                            </div>
                            <div class="payment-memo">간편결제</div>
                        </div>
                        <div class="text-end me-2">
                            <div class="payment-lastused-label">최근 사용</div>
                            <div class="payment-lastused-value">2026.06.30</div>
                        </div>
                        <div class="d-flex gap-2 payment-actions flex-shrink-0">
                            <button type="button" class="btn-icon" title="편집">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/>
                                </svg>
                            </button>
                            <button type="button" class="btn-icon btn-icon-delete" title="삭제">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                </div>
            </div>

            <!-- 계좌이체 그룹 -->
            <div class="payment-group">
                <div class="payment-group-header">
                    <span class="payment-group-name">계좌이체</span>
                    <span class="payment-group-count">1</span>
                </div>
                <div class="payment-list">

                    <div class="payment-row">
                        <span class="payment-icon payment-icon-bank">
                            <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3"/>
                            </svg>
                        </span>
                        <div class="flex-fill" style="min-width: 0;">
                            <div class="d-flex align-items-center gap-2">
                                <span class="payment-name">농협 통장이체</span>
                                <span class="payment-linked-badge">월급 통장</span>
                            </div>
                            <div class="payment-memo">공과금 자동이체</div>
                        </div>
                        <div class="text-end me-2">
                            <div class="payment-lastused-label">최근 사용</div>
                            <div class="payment-lastused-value">2026.06.25</div>
                        </div>
                        <div class="d-flex gap-2 payment-actions flex-shrink-0">
                            <button type="button" class="btn-icon" title="편집">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/>
                                </svg>
                            </button>
                            <button type="button" class="btn-icon btn-icon-delete" title="삭제">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                </div>
            </div>

            <!-- 현금 그룹 -->
            <div class="payment-group">
                <div class="payment-group-header">
                    <span class="payment-group-name">현금</span>
                    <span class="payment-group-count">1</span>
                </div>
                <div class="payment-list">

                    <div class="payment-row">
                        <span class="payment-icon payment-icon-cash">
                            <svg xmlns="http://www.w3.org/2000/svg" width="21" height="21" viewBox="0 0 24 24"
                                 fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <rect x="2" y="6" width="20" height="12" rx="2"/>
                                <circle cx="12" cy="12" r="2.5"/>
                                <path d="M6 12h.01M18 12h.01"/>
                            </svg>
                        </span>
                        <div class="flex-fill" style="min-width: 0;">
                            <div class="d-flex align-items-center gap-2">
                                <span class="payment-name">현금</span>
                                <span class="payment-linked-badge">연결 안 함</span>
                            </div>
                            <div class="payment-memo">수기 입력</div>
                        </div>
                        <div class="text-end me-2">
                            <div class="payment-lastused-label">최근 사용</div>
                            <div class="payment-lastused-value">2026.06.22</div>
                        </div>
                        <div class="d-flex gap-2 payment-actions flex-shrink-0">
                            <button type="button" class="btn-icon" title="편집">
                                <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24"
                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                                    <path d="M18.5 2.5a2.12 2.12 0 0 1 3 3L12 15l-4 1 1-4Z"/>
                                </svg>
                            </button>
                            <button type="button" class="btn-icon btn-icon-delete" title="삭제">

                                     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/>
                                </svg>
                            </button>
                        </div>
                    </div>

                </div>
            </div>

        </div>
    </div>

    <!-- 결제수단 추가 모달 -->
    <div class="modal modal-blur fade" id="modal-add-payment" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered" role="document">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">결제수단 추가</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>

                <div class="modal-body">
                    <form>

                        <div class="mb-3">
                            <label class="form-label">결제수단 이름</label>
                            <input type="text" class="form-control" placeholder="예: 신한카드, 카카오페이">
                        </div>

                        <div class="mb-3">
                            <label class="form-label">유형</label>
                            <div class="type-select">
                                <input type="radio" class="btn-check" name="payment-type" id="type-card" checked>
                                <label class="btn" for="type-card">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                                         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="2" y="5" width="20" height="14" rx="2"/>
                                        <path d="M2 10h20"/>
                                    </svg>
                                    카드
                                </label>

                                <input type="radio" class="btn-check" name="payment-type" id="type-bank">
                                <label class="btn" for="type-bank">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                                         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <path d="M3 21h18M3 10h18M5 6l7-3 7 3M4 10v11M20 10v11M8 14v3M12 14v3M16 14v3"/>
                                    </svg>
                                    계좌이체
                                </label>

                                <input type="radio" class="btn-check" name="payment-type" id="type-cash">
                                <label class="btn" for="type-cash">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                                         fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                        <rect x="2" y="6" width="20" height="12" rx="2"/>
                                        <circle cx="12" cy="12" r="2.5"/>
                                        <path d="M6 12h.01M18 12h.01"/>
                                    </svg>
                                    현금
                                </label>
                            </div>
                        </div>

                        <div class="mb-3">
                            <label class="form-label">연결 계좌</label>
                            <select class="form-select">
                                <option>생활비 통장 · 국민은행</option>
                                <option>비상금 · 카카오뱅크</option>
                                <option>월급 통장 · 신한은행</option>
                                <option>연결 안 함</option>
                            </select>
                        </div>

                        <div class="mb-0">
                            <label class="form-label">메모</label>
                            <textarea class="form-control" rows="3" placeholder="예: 교통비 전용, 정기결제용"></textarea>
                        </div>

                    </form>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn" data-bs-dismiss="modal">취소</button>
                    <button type="button" class="btn btn-add-dark">결제수단 추가</button>
                </div>

            </div>
        </div>
    </div>

</section>
</body>
</html>
