<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title layout:title-pattern="$CONTENT_TITLE | 살림">살림</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css">

  <style>
    @font-face {
      font-family: 'Pretendard Variable';
      src: url('/fonts/pretendard/woff2/PretendardVariable.woff2') format('woff2');
      font-weight: 100 900;
      font-display: swap;
    }
  </style>

  <style>
    :root {
      --salim-income:      #2D6A4F;
      --salim-expense:     #C1604A;
      --salim-balance:     #1E2D3D;
      --salim-sidebar-bg:  #1E2D3D;
      --salim-sidebar-active: #2D6A4F;
    }

    body {
      font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    .navbar-vertical {
      background-color: var(--salim-sidebar-bg) !important;
      border-right: none !important;
    }

    .navbar-brand {
      color: #ffffff !important;
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .navbar-vertical .nav-link {
      color: rgba(255, 255, 255, 0.65) !important;
      border-radius: 6px;
      margin: 2px 8px;
      transition: background 0.15s, color 0.15s;
    }

    .navbar-vertical .nav-link:hover {
      color: #ffffff !important;
      background-color: rgba(255, 255, 255, 0.08) !important;
    }

    .navbar-vertical .nav-link.active {
      color: #ffffff !important;
      background-color: var(--salim-sidebar-active) !important;
    }

    .navbar-vertical .nav-link .nav-link-icon {
      color: inherit !important;
    }

    /* 사이드바 하단 유저 영역 */
    .sidebar-user {
      padding: 12px 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
      margin-top: auto;
    }

    .sidebar-user .user-name {
      color: #ffffff;
      font-size: 0.875rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .sidebar-user .user-email {
      color: rgba(255, 255, 255, 0.45);
      font-size: 0.75rem;
    }

    .sidebar-logout {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-top: 8px;
      padding: 4px 0;
      color: rgba(255, 255, 255, 0.45) !important;
      font-size: 0.8125rem;
      text-decoration: none;
      transition: color 0.15s;
    }

    .sidebar-logout:hover {
      color: rgba(255, 255, 255, 0.85) !important;
    }

    /* 전역 수입/지출 유틸리티 */
    .text-income  { color: var(--salim-income)  !important; }
    .text-expense { color: var(--salim-expense) !important; }
    .text-balance { color: var(--salim-balance) !important; }

    .badge-income  { background-color: rgba(45, 106, 79, 0.12);  color: var(--salim-income);  }
    .badge-expense { background-color: rgba(193, 96, 74, 0.12);  color: var(--salim-expense); }
    .badge-balance { background-color: rgba(30, 45, 61, 0.10);   color: var(--salim-balance); }
  </style>

  <th:block layout:fragment="page-css"></th:block>
</head>

<body class="antialiased">
  <div class="wrapper">

    <aside class="navbar navbar-vertical navbar-expand-lg">
      <div class="container-fluid">

        <button class="navbar-toggler" type="button"
                data-bs-toggle="collapse" data-bs-target="#navbar-menu">
          <span class="navbar-toggler-icon"></span>
        </button>

        <a href="/dashboard" class="navbar-brand navbar-brand-autodark">
          <span>살림</span>
        </a>

        <div class="collapse navbar-collapse" id="navbar-menu">
          <ul class="navbar-nav pt-lg-3">

            <li class="nav-item">
              <a class="nav-link"
                 th:classappend="${currentUri == '/dashboard'} ? 'active'"
                 href="/dashboard">
                <span class="nav-link-icon d-md-none d-lg-inline-block">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                       viewBox="0 0 24 24" fill="none" stroke="currentColor"
                       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
                    <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
                  </svg>
                </span>
                <span class="nav-link-title">대시보드</span>
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link"
                 th:classappend="${currentUri.startsWith('/transactions')} ? 'active'"
                 href="/transactions">
                <span class="nav-link-icon d-md-none d-lg-inline-block">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                       viewBox="0 0 24 24" fill="none" stroke="currentColor"
                       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/>
                    <rect x="9" y="3" width="6" height="4" rx="2"/>
                    <line x1="9" y1="12" x2="15" y2="12"/>
                    <line x1="9" y1="16" x2="13" y2="16"/>
                  </svg>
                </span>
                <span class="nav-link-title">거래 내역</span>
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link"
                 th:classappend="${currentUri.startsWith('/categories')} ? 'active'"
                 href="/categories">
                <span class="nav-link-icon d-md-none d-lg-inline-block">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                       viewBox="0 0 24 24" fill="none" stroke="currentColor"
                       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 6h16M4 12h16M4 18h7"/>
                  </svg>
                </span>
                <span class="nav-link-title">카테고리</span>
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link"
                 th:classappend="${currentUri.startsWith('/payment-methods')} ? 'active'"
                 href="/payment-methods">
                <span class="nav-link-icon d-md-none d-lg-inline-block">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                       viewBox="0 0 24 24" fill="none" stroke="currentColor"
                       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="5" width="20" height="14" rx="2"/>
                    <line x1="2" y1="10" x2="22" y2="10"/>
                  </svg>
                </span>
                <span class="nav-link-title">결제수단</span>
              </a>
            </li>

            <li class="nav-item">
              <a class="nav-link"
                 th:classappend="${currentUri.startsWith('/settings')} ? 'active'"
                 href="/settings">
                <span class="nav-link-icon d-md-none d-lg-inline-block">
                  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                       viewBox="0 0 24 24" fill="none" stroke="currentColor"
                       stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="3"/>
                    <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06
                             a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09
                             A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83
                             l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09
                             A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83
                             l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09
                             a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83
                             l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09
                             a1.65 1.65 0 0 0-1.51 1z"/>
                  </svg>
                </span>
                <span class="nav-link-title">설정</span>
              </a>
            </li>

          </ul>

          <div class="sidebar-user mt-auto">
            <div class="d-flex align-items-center gap-2">
              <span class="avatar avatar-sm"
                    style="background-color: var(--salim-income); color: #fff; font-weight: 700;">
                홍
              </span>
              <div>
                <div class="user-name">홍길동</div>
                <div class="user-email">hong@salrim.com</div>
              </div>
            </div>

            <form th:action="@{/logout}" method="post" class="d-inline">
              <button type="submit" class="sidebar-logout btn btn-link p-0 border-0">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                     viewBox="0 0 24 24" fill="none" stroke="currentColor"
                     stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                  <polyline points="16 17 21 12 16 7"/>
                  <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                로그아웃
              </button>
            </form>
          </div>

        </div>
      </div>
    </aside>

    <div class="page-wrapper">
      <div layout:fragment="content"></div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>
  <th:block layout:fragment="page-js"></th:block>

</body>
</html>
