<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE | 살림">살림</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/favicon.svg}">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/css/tabler.min.css">

    <style>
        :root {
            --salim-income: #2D6A4F;
            --salim-expense: #C1604A;
            --salim-balance: #1E2D3D;
            --salim-sidebar-bg: #1E2D3D;
            --salim-sidebar-active: #2D6A4F;
        }

        html {
            overflow-y: auto;
            scrollbar-gutter: stable;
        }

        body {
            font-family: 'Pretendard Variable', -apple-system, BlinkMacSystemFont, sans-serif;
            --tblr-body-bg: #F4F6FA;
        }

        .page-wrapper {
            background-color: #F4F6FA;
        }

        .page-body {
            margin-top: 1.0rem;
        }

        /* 브랜드 로고 이미지 비율 유지 */
        .navbar-brand-logo {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }

        section {
            margin-left: 15px;
            margin-right: 15px;
        }

        /* ===== 사이드바 본체 ===== */
        .navbar-vertical {
            background-color: var(--salim-sidebar-bg) !important;
            border-right: none !important;
            width: 248px; /* 살짝 넓게 (기본 15rem=240px → 248px) */
        }

        .navbar-vertical .container-fluid {
            padding-left: 12px;
            padding-right: 12px;
        }

        /* ===== 브랜드(로고) - 상하 여백 넉넉하게 ===== */
        .navbar-vertical .navbar-brand {
            color: #ffffff !important;
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.3px;
            width: 100% !important;
            justify-content: flex-start !important;
            gap: 10px;
            padding: 16px 8px !important; /* 상하 16px로 헤더 영역 크게 */
            margin-left: 10px !important;
            margin-bottom: 5px !important;
        }

        .brand-logo {
            background-color: transparent;
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        /* ===== 네비 링크 - 높이/간격 키움 ===== */
        .navbar-vertical .navbar-nav {
            gap: 4px; /* 아이템 사이 간격 */
            padding-top: 8px !important;
        }

        .navbar-vertical .nav-link {
            color: rgba(255, 255, 255, 0.65) !important;
            border-radius: 8px;
            margin: 0 8px;
            padding: 11px 12px; /* 세로 패딩 8→11px, 메뉴 키 큼 */
            display: flex;
            align-items: center;
            gap: 13px; /* 아이콘-텍스트 간격 넓게 */
            font-size: 0.9375rem;
            transition: background 0.15s, color 0.15s;
        }

        .navbar-vertical .nav-link:hover {
            color: #ffffff !important;
            background-color: rgba(255, 255, 255, 0.08) !important;
        }

        .navbar-vertical .nav-link.active {
            color: #ffffff !important;
            background-color: var(--salim-sidebar-active) !important;
        }

        /* 아이콘 18px 고정, 항상 표시 */
        .navbar-vertical .nav-link .nav-link-icon {
            color: inherit !important;
            display: inline-flex !important;
            align-items: center;
            justify-content: center;
            width: 18px;
            height: 18px;
            flex-shrink: 0;
            margin: 0;
        }

        .navbar-vertical .nav-link .nav-link-icon svg {
            width: 18px;
            height: 18px;
        }

        /* ===== 하단 유저 영역 - 패딩 넉넉 ===== */
        .sidebar-user {
            padding: 16px 18px;
            margin-top: auto;
        }

        .sidebar-user .user-name {
            color: #ffffff;
            font-size: 0.9rem;
            font-weight: 600;
            line-height: 1.3;
        }

        .sidebar-user .user-email {
            color: rgba(255, 255, 255, 0.45);
            font-size: 0.78rem;
        }

        .sidebar-logout {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding: 4px 0;
            color: rgba(255, 255, 255, 0.45) !important;
            font-size: 0.85rem;
            text-decoration: none;
            transition: color 0.15s;
        }

        .sidebar-logout:hover {
            color: rgba(255, 255, 255, 0.85) !important;
            background-color: transparent !important;
        }

        /* ===== 구분선 ===== */
        .sidebar-hr {
            border: none !important;
            border-top: 1px solid rgba(255, 255, 255, 0.2) !important;
            margin: 0 18px !important;
            opacity: 1 !important;
        }

        /* ===== 접기 버튼 - 크고 시원하게 ===== */
        .sidebar-collapse {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 16px 18px; /* 패딩 키움 */
            color: rgba(255, 255, 255, 0.65) !important;
            font-size: 0.9rem; /* 폰트 키움 */
            text-decoration: none;
            cursor: pointer;
            background: none;
            border: none;
            width: 100%;
            text-align: left;
            transition: color 0.15s;
        }

        .sidebar-collapse svg {
            width: 18px;
            height: 18px;
        }

        .sidebar-collapse:hover {
            color: rgba(255, 255, 255, 0.9) !important;
        }

        /* ===== 사이드바 접기 상태 ===== */
        .wrapper.navbar-vertical-collapsed .navbar-vertical {
            width: 76px;
        }

        .wrapper.navbar-vertical-collapsed .navbar-brand span:not(.brand-logo),
        .wrapper.navbar-vertical-collapsed .nav-link-title,
        .wrapper.navbar-vertical-collapsed .sidebar-user .user-name,
        .wrapper.navbar-vertical-collapsed .sidebar-user .user-email,
        .wrapper.navbar-vertical-collapsed #sidebarCollapseText {
            display: none;
        }

        .wrapper.navbar-vertical-collapsed .navbar-vertical .nav-link {
            justify-content: center;
            margin: 0 8px;
            padding: 11px;
        }

        .wrapper.navbar-vertical-collapsed .sidebar-collapse {
            justify-content: center;
        }

        .wrapper.navbar-vertical-collapsed .page-wrapper {
            margin-left: 76px;
        }

        /* ===== 수입/지출 유틸리티 ===== */
        .text-income {
            color: var(--salim-income) !important;
        }

        .text-expense {
            color: var(--salim-expense) !important;
        }

        .text-balance {
            color: var(--salim-balance) !important;
        }

        .badge-income {
            background-color: rgba(45, 106, 79, 0.12);
            color: var(--salim-income);
        }

        .badge-expense {
            background-color: rgba(193, 96, 74, 0.12);
            color: var(--salim-expense);
        }

        .badge-balance {
            background-color: rgba(30, 45, 61, 0.10);
            color: var(--salim-balance);
        }
    </style>

    <th:block layout:fragment="page-css"></th:block>
</head>

    if (localStorage.getItem('sidebarCollapsed') === 'true') {
        document.currentScript.parentElement.classList.add('navbar-vertical-collapsed');

<script src="https://cdn.jsdelivr.net/npm/@tabler/core@latest/dist/js/tabler.min.js"></script>
<script>
    function toggleSidebar() {
        const wrapper = document.querySelector('.wrapper');
        const icon = document.getElementById('sidebarCollapseIcon');
        const text = document.getElementById('sidebarCollapseText');
        const isCollapsed = wrapper.classList.toggle('navbar-vertical-collapsed');
        localStorage.setItem('sidebarCollapsed', isCollapsed);
        if (isCollapsed) {
            icon.style.transform = 'rotate(180deg)';
            text.textContent = '펼치기';
        } else {
            icon.style.transform = '';
            text.textContent = '접기';
        }
    }

    // 접힘 상태 복원 시 아이콘/텍스트도 동기화
    document.addEventListener('DOMContentLoaded', function () {
        if (localStorage.getItem('sidebarCollapsed') === 'true') {
            document.getElementById('sidebarCollapseIcon').style.transform = 'rotate(180deg)';
            document.getElementById('sidebarCollapseText').textContent = '펼치기';
        }
    });
</script>
<th:block layout:fragment="page-js"></th:block>

</html>
