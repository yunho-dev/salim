<script src="https://cdn.jsdelivr.net/npm/@tabler/core@1.4.0/dist/js/tabler.min.js"></script>
<script>
    function toggleSidebar() {
        const wrapper = document.querySelector('.wrapper');
        const icon = document.getElementById('sidebarCollapseIcon');
        const text = document.getElementById('sidebarCollapseText');
        const isCollapsed = wrapper.classList.toggle('navbar-vertical-collapsed');
        localStorage.setItem('sidebarCollapsed', isCollapsed);
        if (isCollapsed) {
            icon.style.transform = 'rotate(180deg)';
            text.textContent = '펼치기';
        } else {
            icon.style.transform = '';
            text.textContent = '접기';
        }
    }

    // 접힘 상태 복원 시 아이콘/텍스트도 동기화
    document.addEventListener('DOMContentLoaded', function () {
        if (localStorage.getItem('sidebarCollapsed') === 'true') {
            document.getElementById('sidebarCollapseIcon').style.transform = 'rotate(180deg)';
            document.getElementById('sidebarCollapseText').textContent = '펼치기';
        }
    });
</script>
